services:
  postgres:
    image: postgres:15
    container_name: projex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: projex
    ports:
      - "${POSTGRES_BIND_HOST:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d projex"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - backend_net

  migrate:
    image: migrate/migrate:v4.18.3
    container_name: projex-migrate
    volumes:
      - ./migrations:/migrations
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://postgres:postgres@projex-postgres:5432/projex?sslmode=disable",
        "up",
      ]
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    networks:
      - backend_net

  backend:
    build:
      context: .
      dockerfile: docker/api.dockerfile
    container_name: projex-backend
    env_file:
      - backend/.env
    restart: unless-stopped
    ports:
      - "${AI_BIND_HOST:-127.0.0.1}:${AI_PORT:-8080}:${AI_PORT:-8080}"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      RELOAD: "false"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8080/ready'', timeout=3)"',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend_net

  # web:
  #   build:
  #     context: .
  #     dockerfile: docker/web.dockerfile
  #   container_name: web
  #   restart: unless-stopped
  #   ports:
  #     - "${WEB_BIND_HOST:-127.0.0.1}:3000:3000"
  #   depends_on:
  #     backend:
  #       condition: service_started
  #   networks:
  #     - backend_net

volumes:
  postgres_data:

networks:
  backend_net:
